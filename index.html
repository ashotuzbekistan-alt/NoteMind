<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NoteMind</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            text-align: center;
            padding: 60px 20px;
        }
        .box {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 3rem;
            color: #2980b9;
            margin-bottom: 5px;
        }
        .sub {
            font-size: 1.1rem;
            color: #636e72;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            background: #00b894;
            color: white;
            font-size: 1.6rem;
            font-weight: 700;
            padding: 18px 50px;
            border-radius: 60px;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 184, 148, 0.4);
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #00a381;
        }
        .btn .small {
            display: block;
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 5px;
        }
        .version {
            margin-top: 15px;
            color: #b2bec3;
            font-size: 0.9rem;
        }
        .features {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .feature {
            background: #f8f9fa;
            padding: 12px 8px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #2d3436;
        }
        .footer {
            margin-top: 30px;
            color: #b2bec3;
            font-size: 0.85rem;
        }
        @media (max-width: 500px) {
            .features { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 2.2rem; }
            .btn { font-size: 1.2rem; padding: 14px 30px; }
        }
    </style>
</head>
<body>

<div class="box">
    <h1>📝 NoteMind</h1>
    <p class="sub">Простые заметки для Windows 10/11</p>

    <a href="NoteMind.exe" download class="btn">
        ⬇ Скачать
        <span class="small">Установщик для Windows</span>
    </a>
    <p class="version">Версия 1.0 • ~4 МБ</p>

    <div class="features">
        <div class="feature">📝 Несколько заметок</div>
        <div class="feature">🌙 Тёмная тема</div>
        <div class="feature">🔐 Защита паролем</div>
        <div class="feature">💾 Автосохранение</div>
        <div class="feature">📄 Экспорт в PDF</div>
        <div class="feature">🔍 Быстрый поиск</div>
    </div>

    <div class="footer">
        © 2026 NoteMind • Сделано с ❤️
    </div>
</div>

</body>
</html>
